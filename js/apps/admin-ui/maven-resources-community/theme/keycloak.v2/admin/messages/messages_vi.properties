requestObjectRequiredHelp=Chỉ định liệu ứng dụng khách có cần cung cấp một đối tượng yêu cầu với các yêu cầu ủy quyền của họ hay không, và phương thức nào họ có thể sử dụng cho việc này. Nếu đặt là "không bắt buộc", việc cung cấp đối tượng yêu cầu là tùy chọn. Trong tất cả các trường hợp khác, việc cung cấp đối tượng yêu cầu là bắt buộc. Nếu đặt là "request", đối tượng yêu cầu phải được cung cấp bằng giá trị. Nếu đặt là "request_uri", đối tượng yêu cầu phải được cung cấp bằng tham chiếu. Nếu đặt là "request or request_uri", có thể sử dụng một trong hai phương thức.
