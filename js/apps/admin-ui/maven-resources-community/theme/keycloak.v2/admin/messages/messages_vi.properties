unmanagedAttributesHelpText=Thuộc tính không được quản lý là các thuộc tính người dùng không được xác định rõ ràng trong cấu hình hồ sơ người dùng. \
  Theo mặc định, các thuộc tính không được quản lý được `Tắt` và không khả dụng từ bất kỳ ngữ cảnh nào như đăng ký, tài khoản, và bảng điều khiển quản trị. \
  Bằng cách đặt `Bật`, các thuộc tính không được quản lý được công nhận hoàn toàn bởi máy chủ và có thể truy cập qua tất cả các ngữ cảnh, hữu ích nếu bạn bắt đầu di chuyển một realm hiện có sang hồ sơ người dùng khai báo và bạn chưa xác định tất cả các thuộc tính người dùng trong cấu hình hồ sơ người dùng. \
  Bằng cách đặt `Chỉ quản trị viên có thể ghi`, các thuộc tính không được quản lý chỉ có thể được quản lý qua bảng điều khiển quản trị và API, hữu ích nếu bạn đã xác định bất kỳ thuộc tính tùy chỉnh nào có thể được quản lý bởi người dùng nhưng bạn không chắc chắn về việc thêm các thuộc tính khác chỉ nên được quản lý bởi quản trị viên. \
  Bằng cách đặt `Chỉ quản trị viên có thể xem`, các thuộc tính không được quản lý là chỉ đọc và chỉ khả dụng qua bảng điều khiển quản trị và API.
