loa-condition-level.tooltip=Cấp độ xác thực. Giá trị này luôn phải là số nguyên, lớn hơn hoặc bằng 0. Các luồng con trong luồng xác thực phải luôn được sắp xếp từ cấp độ thấp đến cấp độ cao hơn.
loa-max-age=Thời gian tối đa
loa-max-age.tooltip=Thời gian tối đa tính bằng giây cho cấp độ xác thực này để có hiệu lực. Nếu cấp độ cụ thể được yêu cầu và người dùng đã xác thực với cấp độ này sớm hơn số giây được chỉ định, họ sẽ không được yêu cầu xác thực lại. Nhưng nếu họ xác thực muộn hơn số giây được chỉ định, họ sẽ cần xác thực lại với cấp độ này. Giá trị 0 trong cấu hình có nghĩa là người dùng luôn phải xác thực lại với cấp độ này bất cứ khi nào cấp độ này được yêu cầu.
