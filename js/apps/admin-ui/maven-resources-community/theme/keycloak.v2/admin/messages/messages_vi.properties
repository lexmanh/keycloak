authenticatorRefConfig.value.help=Thêm một tên tham chiếu tùy chỉnh cho trình xác thực. Khi trình xác thực này được hoàn thành thành công trong một luồng xác thực, bộ ánh xạ giao thức Authentication Method Reference (AMR) sẽ sử dụng giá trị này để điền vào yêu cầu amr của các mã thông báo được tạo. Lưu ý, giao thức AMR phải được cấu hình cho ứng dụng khách đã cho để điền vào yêu cầu AMR.
authenticatorRefConfig.value.label=Tham chiếu Trình xác thực
authenticatorRefConfig.maxAge.help=Thời gian tối đa tính bằng giây mà giá trị tham chiếu trình xác thực có hiệu lực trong một phiên SSO. Khi bộ ánh xạ giao thức Authentication Method Reference (AMR) được sử dụng, AMR chỉ được coi là hợp lệ và điền vào mã thông báo nếu việc thực thi trình xác thực được hoàn thành trong thời gian tối đa được chỉ định.
